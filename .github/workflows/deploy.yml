name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION:     us-central1
  APP_NAME:   workspace-agent
  REGISTRY:   us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/workspace-agent-repo

jobs:

  # ── Temporary debug job — shows exact OIDC token claims ──────────────────
  # Delete this job once auth is working.
  debug-oidc:
    name: Debug OIDC Token Claims
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Print all OIDC token claims
        run: |
          TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://iam.googleapis.com/${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" \
            | jq -r '.value')
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | \
            python3 -c "import sys,base64,json; d=sys.stdin.read().strip(); d+='='*(-len(d)%4); print(json.dumps(json.loads(base64.b64decode(d)), indent=2))")
          echo "$PAYLOAD"

  # ── Main deploy job ───────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: tag
        run: |
          SHA=$(echo "${{ github.sha }}" | head -c 8)
          IMAGE="${{ env.REGISTRY }}/${{ env.APP_NAME }}:${SHA}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            --tag "${{ steps.tag.outputs.image }}" \
            --tag "${{ env.REGISTRY }}/${{ env.APP_NAME }}:latest" \
            .

      - name: Push to Artifact Registry
        run: |
          docker push "${{ steps.tag.outputs.image }}"
          docker push "${{ env.REGISTRY }}/${{ env.APP_NAME }}:latest"

      - name: Deploy to Cloud Run
        run: |
          APP_URL="${{ secrets.APP_URL }}"
          if [[ -n "$APP_URL" ]]; then
            REDIRECT_URI="${APP_URL}/auth/google/callback"
            CORS_ORIGINS="${APP_URL}"
          else
            REDIRECT_URI="http://localhost:8000/auth/google/callback"
            CORS_ORIGINS="*"
          fi

          gcloud run deploy ${{ env.APP_NAME }} \
            --image="${{ steps.tag.outputs.image }}" \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --service-account="${{ env.APP_NAME }}-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-env-vars="APP_ENV=production,LOG_LEVEL=INFO,GEMINI_MODEL=${{ secrets.GEMINI_MODEL }},GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},GOOGLE_CLOUD_LOCATION=${{ env.REGION }},GOOGLE_OAUTH_REDIRECT_URI=${REDIRECT_URI},CORS_ALLOW_ORIGINS=${CORS_ORIGINS}" \
            --set-secrets="GEMINI_API_KEY=workspace-agent-gemini-api-key:latest,GOOGLE_CLIENT_SECRETS_JSON=workspace-agent-google-client-secrets:latest" \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=3600 \
            --quiet

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe ${{ env.APP_NAME }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "### ✅ Deployed to Cloud Run" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** ${URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** ${{ steps.tag.outputs.image }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ -z "${{ secrets.APP_URL }}" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ Add \`${URL}/auth/google/callback\` to OAuth redirect URIs, update APP_URL secret, push again." >> "$GITHUB_STEP_SUMMARY"
          fi
