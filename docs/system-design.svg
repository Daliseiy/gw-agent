<svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" font-family="Google Sans, Inter, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5f6368"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a73e8"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34a853"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1c1e" letter-spacing="-0.3">Google Workspace Voice AI Assistant — System Design</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#74777b">End-to-end bidirectional voice architecture on GCP Cloud Run</text>

  <!-- ══ ZONE LABELS ══════════════════════════════════════════════════════ -->
  <!-- Client Zone -->
  <rect x="30" y="75" width="220" height="580" rx="16" fill="#f0f4ff" stroke="#c6d4f7" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="140" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#1a73e8" letter-spacing="0.8" text-transform="uppercase">BROWSER CLIENT</text>

  <!-- GCP Cloud Run Zone -->
  <rect x="280" y="75" width="330" height="580" rx="16" fill="#f0faf3" stroke="#a8d5b5" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="445" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#34a853" letter-spacing="0.8">GCP · CLOUD RUN</text>

  <!-- Google APIs Zone -->
  <rect x="640" y="75" width="430" height="580" rx="16" fill="#fffdf0" stroke="#f5d77e" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="855" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#f9ab00" letter-spacing="0.8">GOOGLE APIS</text>

  <!-- ══ BROWSER COMPONENTS ══════════════════════════════════════════════ -->

  <!-- Voice Studio UI -->
  <rect x="50" y="115" width="180" height="64" rx="12" fill="white" stroke="#d2e3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="50" y="115" width="180" height="12" rx="12" fill="#1a73e8"/>
  <rect x="50" y="121" width="180" height="6" rx="0" fill="#1a73e8"/>
  <text x="140" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Voice Studio UI</text>
  <text x="140" y="163" text-anchor="middle" font-size="10" fill="#74777b">assistant.html</text>

  <!-- Web Audio API -->
  <rect x="50" y="200" width="180" height="64" rx="12" fill="white" stroke="#d2e3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="50" y="200" width="180" height="12" rx="12" fill="#4285f4"/>
  <rect x="50" y="206" width="180" height="6" rx="0" fill="#4285f4"/>
  <text x="140" y="233" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Web Audio API</text>
  <text x="140" y="248" text-anchor="middle" font-size="10" fill="#74777b">AudioContext · AudioWorklet</text>

  <!-- PCM Processor -->
  <rect x="50" y="285" width="180" height="64" rx="12" fill="white" stroke="#d2e3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="50" y="285" width="180" height="12" rx="12" fill="#4285f4"/>
  <rect x="50" y="291" width="180" height="6" rx="0" fill="#4285f4"/>
  <text x="140" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">PCM Processors</text>
  <text x="140" y="333" text-anchor="middle" font-size="10" fill="#74777b">capture-worklet · player-worklet</text>

  <!-- WebSocket Client -->
  <rect x="50" y="370" width="180" height="64" rx="12" fill="white" stroke="#d2e3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="50" y="370" width="180" height="12" rx="12" fill="#673ab7"/>
  <rect x="50" y="376" width="180" height="6" rx="0" fill="#673ab7"/>
  <text x="140" y="403" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">WebSocket Client</text>
  <text x="140" y="418" text-anchor="middle" font-size="10" fill="#74777b">Binary PCM16 frames</text>

  <!-- Google OAuth -->
  <rect x="50" y="455" width="180" height="64" rx="12" fill="white" stroke="#d2e3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="50" y="455" width="180" height="12" rx="12" fill="#ea4335"/>
  <rect x="50" y="461" width="180" height="6" rx="0" fill="#ea4335"/>
  <text x="140" y="488" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Google OAuth Flow</text>
  <text x="140" y="503" text-anchor="middle" font-size="10" fill="#74777b">Sign-in · Consent screen</text>

  <!-- Response Feed -->
  <rect x="50" y="540" width="180" height="64" rx="12" fill="white" stroke="#d2e3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="50" y="540" width="180" height="12" rx="12" fill="#34a853"/>
  <rect x="50" y="546" width="180" height="6" rx="0" fill="#34a853"/>
  <text x="140" y="573" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Response Feed</text>
  <text x="140" y="588" text-anchor="middle" font-size="10" fill="#74777b">Tool cards · Transcripts</text>

  <!-- ══ CLOUD RUN COMPONENTS ════════════════════════════════════════════ -->

  <!-- FastAPI App -->
  <rect x="300" y="115" width="190" height="64" rx="12" fill="white" stroke="#b6eac5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="300" y="115" width="190" height="12" rx="12" fill="#34a853"/>
  <rect x="300" y="121" width="190" height="6" rx="0" fill="#34a853"/>
  <text x="395" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">FastAPI Application</text>
  <text x="395" y="163" text-anchor="middle" font-size="10" fill="#74777b">uvicorn · ASGI · CORS</text>

  <!-- Auth Router -->
  <rect x="300" y="200" width="190" height="64" rx="12" fill="white" stroke="#b6eac5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="300" y="200" width="190" height="12" rx="12" fill="#ea4335"/>
  <rect x="300" y="206" width="190" height="6" rx="0" fill="#ea4335"/>
  <text x="395" y="233" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Auth Router</text>
  <text x="395" y="248" text-anchor="middle" font-size="10" fill="#74777b">OAuth2 callback · Session mgr</text>

  <!-- Voice Router / WS -->
  <rect x="300" y="285" width="190" height="64" rx="12" fill="white" stroke="#b6eac5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="300" y="285" width="190" height="12" rx="12" fill="#673ab7"/>
  <rect x="300" y="291" width="190" height="6" rx="0" fill="#673ab7"/>
  <text x="395" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Voice Router</text>
  <text x="395" y="333" text-anchor="middle" font-size="10" fill="#74777b">WebSocket /ws · up/downstream</text>

  <!-- Gemini Live Client -->
  <rect x="300" y="370" width="190" height="64" rx="12" fill="white" stroke="#b6eac5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="300" y="370" width="190" height="12" rx="12" fill="#f9ab00"/>
  <rect x="300" y="376" width="190" height="6" rx="0" fill="#f9ab00"/>
  <text x="395" y="403" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Gemini Live Client</text>
  <text x="395" y="418" text-anchor="middle" font-size="10" fill="#74777b">google-genai · aio.live.connect</text>

  <!-- Tool Executor -->
  <rect x="300" y="455" width="190" height="64" rx="12" fill="white" stroke="#b6eac5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="300" y="455" width="190" height="12" rx="12" fill="#1a73e8"/>
  <rect x="300" y="461" width="190" height="6" rx="0" fill="#1a73e8"/>
  <text x="395" y="488" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Tool Executor</text>
  <text x="395" y="503" text-anchor="middle" font-size="10" fill="#74777b">33 workspace tools · asyncio</text>

  <!-- Secret Manager ref -->
  <rect x="300" y="540" width="190" height="64" rx="12" fill="white" stroke="#b6eac5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="300" y="540" width="190" height="12" rx="12" fill="#5f6368"/>
  <rect x="300" y="546" width="190" height="6" rx="0" fill="#5f6368"/>
  <text x="395" y="573" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Secret Manager</text>
  <text x="395" y="588" text-anchor="middle" font-size="10" fill="#74777b">API keys · OAuth credentials</text>

  <!-- ══ GOOGLE API COMPONENTS ═══════════════════════════════════════════ -->

  <!-- Gemini Live API -->
  <rect x="660" y="115" width="185" height="64" rx="12" fill="white" stroke="#f5d77e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="660" y="115" width="185" height="12" rx="12" fill="#f9ab00"/>
  <rect x="660" y="121" width="185" height="6" rx="0" fill="#f9ab00"/>
  <text x="752" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Gemini Live API</text>
  <text x="752" y="163" text-anchor="middle" font-size="10" fill="#74777b">native-audio · VAD · session resumption</text>

  <!-- Google OAuth API -->
  <rect x="875" y="115" width="175" height="64" rx="12" fill="white" stroke="#f5d77e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="875" y="115" width="175" height="12" rx="12" fill="#ea4335"/>
  <rect x="875" y="121" width="175" height="6" rx="0" fill="#ea4335"/>
  <text x="962" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Google OAuth 2.0</text>
  <text x="962" y="163" text-anchor="middle" font-size="10" fill="#74777b">Identity · Consent · Token</text>

  <!-- Gmail API -->
  <rect x="660" y="210" width="175" height="52" rx="12" fill="white" stroke="#f5d77e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="748" y="233" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Gmail API</text>
  <text x="748" y="250" text-anchor="middle" font-size="10" fill="#74777b">Read · Draft · Send</text>

  <!-- Calendar API -->
  <rect x="660" y="278" width="175" height="52" rx="12" fill="white" stroke="#f5d77e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="748" y="301" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Calendar API</text>
  <text x="748" y="318" text-anchor="middle" font-size="10" fill="#74777b">Events · Meetings · Meet links</text>

  <!-- Tasks API -->
  <rect x="660" y="346" width="175" height="52" rx="12" fill="white" stroke="#f5d77e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="748" y="369" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Google Tasks API</text>
  <text x="748" y="386" text-anchor="middle" font-size="10" fill="#74777b">Create · Update · Complete</text>

  <!-- Contacts API -->
  <rect x="660" y="414" width="175" height="52" rx="12" fill="white" stroke="#f5d77e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="748" y="437" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">People API</text>
  <text x="748" y="454" text-anchor="middle" font-size="10" fill="#74777b">Contact lookup · Email resolve</text>

  <!-- Artifact Registry -->
  <rect x="875" y="210" width="175" height="52" rx="12" fill="white" stroke="#f5d77e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="962" y="233" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Artifact Registry</text>
  <text x="962" y="250" text-anchor="middle" font-size="10" fill="#74777b">Docker image store</text>

  <!-- Terraform / CI/CD -->
  <rect x="875" y="278" width="175" height="52" rx="12" fill="white" stroke="#f5d77e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="962" y="301" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">Terraform IaC</text>
  <text x="962" y="318" text-anchor="middle" font-size="10" fill="#74777b">Infra provisioning · Cloud Run</text>

  <!-- GitHub Actions -->
  <rect x="875" y="346" width="175" height="52" rx="12" fill="white" stroke="#f5d77e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="962" y="369" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1c1e">GitHub Actions</text>
  <text x="962" y="386" text-anchor="middle" font-size="10" fill="#74777b">CI/CD on push to main</text>

  <!-- ══ ARROWS — BROWSER ↔ CLOUD RUN ═══════════════════════════════════ -->

  <!-- UI → Web Audio -->
  <line x1="140" y1="179" x2="140" y2="200" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Web Audio → PCM -->
  <line x1="140" y1="264" x2="140" y2="285" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PCM → WS Client -->
  <line x1="140" y1="349" x2="140" y2="370" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- WS Client → Voice Router (bidirectional) -->
  <line x1="230" y1="395" x2="300" y2="330" stroke="#673ab7" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="340" x2="230" y2="405" stroke="#673ab7" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Label -->
  <rect x="235" y="345" width="62" height="18" rx="4" fill="#ede7ff"/>
  <text x="266" y="358" text-anchor="middle" font-size="9" font-weight="700" fill="#673ab7">PCM16 binary</text>

  <!-- OAuth flow -->
  <line x1="230" y1="487" x2="300" y2="232" stroke="#ea4335" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ══ ARROWS — CLOUD RUN INTERNAL ═════════════════════════════════════ -->

  <!-- FastAPI → Auth Router -->
  <line x1="395" y1="179" x2="395" y2="200" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FastAPI → Voice Router -->
  <line x1="415" y1="179" x2="430" y2="285" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Voice Router → Gemini Live Client -->
  <line x1="395" y1="349" x2="395" y2="370" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Voice Router → Tool Executor -->
  <line x1="375" y1="349" x2="375" y2="455" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>

  <!-- ══ ARROWS — CLOUD RUN → GOOGLE APIS ════════════════════════════════ -->

  <!-- Gemini Live Client → Gemini Live API (main bidirectional) -->
  <line x1="490" y1="395" x2="660" y2="147" stroke="#f9ab00" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="660" y1="155" x2="490" y2="403" stroke="#f9ab00" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="540" y="250" width="80" height="18" rx="4" fill="#fef3d0"/>
  <text x="580" y="263" text-anchor="middle" font-size="9" font-weight="700" fill="#f9ab00">Live bidi stream</text>

  <!-- Tool Executor → Workspace APIs -->
  <line x1="490" y1="487" x2="660" y2="236" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="490" y1="490" x2="660" y2="304" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="490" y1="493" x2="660" y2="372" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="490" y1="496" x2="660" y2="440" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Auth Router → Google OAuth -->
  <line x1="490" y1="232" x2="875" y2="147" stroke="#ea4335" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Secret Manager → FastAPI (env injection) -->
  <line x1="395" y1="572" x2="395" y2="540" stroke="#5f6368" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Artifact Registry / CI arrows -->
  <line x1="962" y1="236" x2="880" y2="400" stroke="#5f6368" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="962" y1="304" x2="800" y2="600" stroke="#5f6368" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ══ LEGEND ════════════════════════════════════════════════════════════ -->
  <rect x="40" y="630" width="1020" height="62" rx="10" fill="white" stroke="#e0e3e8" stroke-width="1"/>
  <text x="60" y="649" font-size="10" font-weight="700" fill="#5f6368" letter-spacing="0.5">LEGEND</text>

  <!-- solid line -->
  <line x1="100" y1="660" x2="130" y2="660" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="135" y="664" font-size="10" fill="#5f6368">HTTP / WebSocket</text>

  <!-- dashed line -->
  <line x1="240" y1="660" x2="270" y2="660" stroke="#5f6368" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="275" y="664" font-size="10" fill="#5f6368">OAuth redirect</text>

  <!-- yellow line -->
  <line x1="370" y1="660" x2="400" y2="660" stroke="#f9ab00" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="405" y="664" font-size="10" fill="#5f6368">Gemini Live bidirectional stream (PCM audio)</text>

  <!-- blue line -->
  <line x1="620" y1="660" x2="650" y2="660" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <text x="655" y="664" font-size="10" fill="#5f6368">Google Workspace API calls (Tasks / Calendar / Gmail / People)</text>

  <!-- purple line -->
  <line x1="880" y1="660" x2="910" y2="660" stroke="#673ab7" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="915" y="664" font-size="10" fill="#5f6368">Binary PCM16 WebSocket frames</text>
</svg>
