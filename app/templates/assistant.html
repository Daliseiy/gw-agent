<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Workspace AI Assistant</title>
  <!-- Prevent flash of wrong theme before CSS loads -->
  <script>
    (function(){
      const s=localStorage.getItem('gw_agent_theme');
      const d=s?s==='dark':window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme',d?'dark':'light');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens — Light ──────────────────────────────────────── */
    :root {
      color-scheme: light;
      --surface:        #ffffff;
      --surface-dim:    #f8f9fa;
      --surface-tint:   #f0f4ff;
      --surface-raised: #ffffff;
      --outline:        #e0e3e8;
      --outline-soft:   #eef0f3;
      --text-1:         #1a1c1e;
      --text-2:         #44474a;
      --text-3:         #74777b;
      --scrim:          rgba(0,0,0,.25);
      /* semantic surfaces */
      --tool-bg:        #faf8ff;
      --tool-border:    #ede7ff;
      --err-bg:         #fff5f5;
      --err-border:     #f5c8c5;
      --err-text:       #8a1c14;
      --ai-bg:          #f4fbf6;
      --ai-border:      #d4edda;
      --ai-text:        #1a5e30;
      /* brand */
      --blue:   #1a73e8;
      --blue-s: #d2e3fc;
      --red:    #ea4335;
      --red-s:  #fce8e6;
      --yellow: #f9ab00;
      --yel-s:  #fef3d0;
      --green:  #34a853;
      --grn-s:  #d4edda;
      --purple: #7c4dff;
      --pur-s:  #ede7ff;
      /* elevations */
      --e1: 0 1px 2px rgba(60,64,67,.15), 0 1px 3px 1px rgba(60,64,67,.07);
      --e2: 0 2px 8px rgba(60,64,67,.15), 0 1px 4px rgba(60,64,67,.08);
      --e3: 0 6px 24px rgba(60,64,67,.14), 0 2px 8px rgba(60,64,67,.08);
      /* radius */
      --r-sm: 12px; --r-md: 18px; --r-lg: 24px; --r-xl: 28px; --r-pill: 999px;
    }

    /* ── Design tokens — Dark ───────────────────────────────────────── */
    [data-theme="dark"] {
      color-scheme: dark;
      --surface:        #1c1e21;
      --surface-dim:    #141618;
      --surface-tint:   #1e2540;
      --surface-raised: #26282c;
      --outline:        #3c3f43;
      --outline-soft:   #2a2d31;
      --text-1:         #e3e5e8;
      --text-2:         #bdc1c6;
      --text-3:         #80868b;
      --scrim:          rgba(0,0,0,.55);
      /* semantic surfaces */
      --tool-bg:        #211d2e;
      --tool-border:    #3d3060;
      --err-bg:         #2c1a18;
      --err-border:     #6b2d28;
      --err-text:       #f28b82;
      --ai-bg:          #162418;
      --ai-border:      #2a5e34;
      --ai-text:        #81c995;
      /* brand stays vivid — only tints get darker */
      --blue-s: #1a3558;
      --red-s:  #3b1614;
      --yel-s:  #3a2e00;
      --grn-s:  #162418;
      --pur-s:  #261650;
      /* elevations become more subtle in dark */
      --e1: 0 1px 3px rgba(0,0,0,.4);
      --e2: 0 2px 10px rgba(0,0,0,.45);
      --e3: 0 6px 28px rgba(0,0,0,.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { transition: background-color 260ms ease, color 260ms ease; }

    body {
      font-family: "Google Sans", system-ui, sans-serif;
      background-color: var(--surface-dim);
      background-image:
        radial-gradient(ellipse 60% 40% at 20% 0%, rgba(26,115,232,.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 85% 100%, rgba(52,168,83,.06) 0%, transparent 65%);
      color: var(--text-1);
      min-height: 100dvh;
      transition: background-color 260ms ease;
    }
    [data-theme="dark"] body {
      background-image:
        radial-gradient(ellipse 60% 40% at 20% 0%, rgba(26,115,232,.09) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 85% 100%, rgba(52,168,83,.07) 0%, transparent 65%);
    }

    /* ── Shell ──────────────────────────────────────────────────────── */
    .shell {
      max-width: 1440px;
      margin: 0 auto;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: 16px 20px 20px;
      gap: 14px;
    }

    /* ── Topbar ─────────────────────────────────────────────────────── */
    .topbar {
      background: var(--surface);
      border: 1px solid var(--outline);
      border-radius: var(--r-xl);
      box-shadow: var(--e1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px 8px 14px;
      gap: 12px;
    }

    .brand { display: flex; align-items: center; gap: 11px; }

    .brand-icon {
      width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
      background: conic-gradient(from 200deg at 50% 50%,
        var(--blue) 0deg, var(--green) 90deg,
        var(--yellow) 180deg, var(--red) 270deg, var(--blue) 360deg);
      box-shadow: inset 0 0 0 5px var(--surface);
    }

    /* ── Theme toggle ───────────────────────────────────────────────── */
    .theme-btn {
      width: 36px; height: 36px; border: 1px solid var(--outline); border-radius: var(--r-sm);
      background: var(--surface); display: grid; place-items: center;
      cursor: pointer; transition: background 120ms ease, transform 120ms ease;
      position: relative; overflow: hidden;
    }
    .theme-btn:hover { background: var(--surface-dim); transform: translateY(-1px); }
    .theme-btn svg { width: 18px; height: 18px; fill: none; stroke: var(--text-2);
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      position: absolute; transition: opacity 220ms ease, transform 220ms ease; }
    .theme-btn .icon-sun  { opacity: 1;  transform: rotate(0deg) scale(1); }
    .theme-btn .icon-moon { opacity: 0;  transform: rotate(-45deg) scale(.6); }
    [data-theme="dark"] .theme-btn .icon-sun  { opacity: 0;  transform: rotate(45deg) scale(.6); }
    [data-theme="dark"] .theme-btn .icon-moon { opacity: 1;  transform: rotate(0deg) scale(1); }

    .brand-text { display: flex; flex-direction: column; }
    .brand-name { font-size: 15px; font-weight: 700; letter-spacing: -.2px; color: var(--text-1); white-space: nowrap; }
    .brand-sub  { font-size: 11px; color: var(--text-3); margin-top: 1px; white-space: nowrap; }

    .topbar-right { display: flex; align-items: center; gap: 8px; }

    .profile-pill {
      display: flex; align-items: center; gap: 8px;
      border: 1px solid var(--outline); border-radius: var(--r-pill);
      padding: 5px 12px 5px 5px; background: var(--surface);
    }
    .profile-pill img { width: 26px; height: 26px; border-radius: 50%; background: #e8eaed; flex-shrink: 0; }
    .profile-pill .name { font-size: 13px; font-weight: 600; white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }

    .btn {
      border: 0; border-radius: var(--r-sm); font-family: inherit; font-size: 13px; font-weight: 600;
      padding: 8px 14px; cursor: pointer; transition: filter 120ms ease, transform 120ms ease;
    }
    .btn:hover { filter: brightness(.96); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-ghost  { background: transparent; border: 1px solid var(--outline); color: var(--text-1); }
    .btn-danger { background: var(--red); color: #fff; box-shadow: var(--e1); }

    .icon-btn {
      width: 36px; height: 36px; border: 1px solid var(--outline); border-radius: var(--r-sm);
      background: var(--surface); display: grid; place-items: center;
      cursor: pointer; transition: background 120ms ease, transform 120ms ease;
    }
    .icon-btn:hover { background: var(--surface-dim); transform: translateY(-1px); }
    .icon-btn svg { width: 18px; height: 18px; stroke: var(--text-2); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Main content: single full-width card ───────────────────────── */
    .voice-card {
      background: var(--surface);
      border: 1px solid var(--outline);
      border-radius: var(--r-xl);
      box-shadow: var(--e2);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      overflow: hidden;
      min-height: 0;
    }

    /* Card header */
    .vc-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--outline-soft);
    }
    .vc-header-left { display: flex; flex-direction: column; gap: 2px; }
    .vc-title  { font-size: 17px; font-weight: 700; letter-spacing: -.2px; }
    .vc-sub    { font-size: 12px; color: var(--text-3); }
    .vc-header-right { display: flex; align-items: center; gap: 8px; }

    /* Connection status dot */
    .conn-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #dadce0;
      transition: background 300ms ease;
      box-shadow: 0 0 0 0 transparent;
    }
    .conn-dot.connected { background: var(--green); box-shadow: 0 0 0 3px rgba(52,168,83,.18); }
    .conn-dot.connecting { background: var(--yellow); animation: dot-pulse 1s ease-in-out infinite; }
    .conn-dot.error { background: var(--red); }
    @keyframes dot-pulse {
      0%,100% { opacity: 1; } 50% { opacity: .4; }
    }

    /* ── Suggestion chips row ───────────────────────────────────────── */
    .chips-row {
      padding: 10px 20px 0;
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center;
    }

    .s-chip {
      display: inline-flex; align-items: center;
      border: 1px solid var(--blue-s); background: var(--surface-tint);
      color: var(--blue); border-radius: var(--r-pill);
      padding: 7px 14px; font-family: inherit; font-size: 12.5px; font-weight: 500;
      white-space: nowrap; cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
      flex-shrink: 0;
    }
    .s-chip:hover { background: #dbeaff; border-color: #a8c7fa; transform: translateY(-1px); }

    /* ── Voice stage ────────────────────────────────────────────────── */
    .voice-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 12px;
      gap: 14px;
      min-height: 0;
    }

    /* Orb ring */
    .orb-wrap {
      position: relative;
      width: clamp(180px, 28vw, 280px);
      aspect-ratio: 1;
      display: grid; place-items: center;
      flex-shrink: 0;
    }

    .ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 3px solid transparent; opacity: .3;
    }
    .ring-a { animation: spin-a 7s linear infinite; border-top-color: var(--blue); border-right-color: var(--yellow); }
    .ring-b { inset: 8%; animation: spin-b 5s linear infinite; border-left-color: var(--red); border-bottom-color: var(--green); }
    .ring-c { inset: 16%; animation: spin-a 9s linear infinite reverse; border-top-color: var(--green); border-right-color: var(--blue); }

    @keyframes spin-a { to { transform: rotate(360deg); } }
    @keyframes spin-b { to { transform: rotate(-360deg); } }

    /* Active states amplify ring */
    .orb-wrap.listening .ring { opacity: .85; animation-duration: 1.4s !important; }
    .orb-wrap.speaking  .ring { opacity: .75; animation-duration: 1.8s !important; }
    .orb-wrap.speaking  .ring-a { border-top-color: var(--green); border-right-color: var(--blue); }
    .orb-wrap.speaking  .ring-b { border-left-color: var(--blue); border-bottom-color: var(--yellow); }
    .orb-wrap.thinking  .ring { opacity: .5; animation-duration: 2.5s !important; }
    .orb-wrap.muted .ring { opacity: .15; }

    /* Mic button (center of orb) */
    .mic-btn {
      position: relative; z-index: 1;
      width: clamp(96px, 14vw, 128px); aspect-ratio: 1;
      border: 0; border-radius: 50%; cursor: pointer;
      font-family: inherit; font-size: 12px; font-weight: 700;
      color: #fff; letter-spacing: .3px; line-height: 1.3;
      text-align: center; padding: 10px;
      display: grid; place-items: center;
      background: linear-gradient(145deg, var(--blue) 0%, #0d62d6 40%, var(--green) 100%);
      box-shadow: var(--e3);
      transition: transform 140ms ease, filter 140ms ease, background 300ms ease;
    }
    .mic-btn:hover:not(:disabled) { transform: scale(1.04); filter: saturate(1.1); }
    .mic-btn:active:not(:disabled) { transform: scale(.97); }
    .mic-btn:disabled { opacity: .4; cursor: not-allowed; }
    .mic-btn.muted  { background: linear-gradient(145deg, #5f6368, #3c4043); }
    .mic-btn.muted:hover:not(:disabled) { filter: brightness(1.12); }

    .mic-icon { width: 28px; height: 28px; flex-shrink: 0; }
    .mic-label { font-size: 11px; margin-top: 3px; opacity: .9; }

    /* Status + badge row */
    .status-row {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      text-align: center;
    }
    .status-text { font-size: 13px; color: var(--text-3); min-height: 20px; }

    .ai-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: var(--r-pill); font-size: 11px; font-weight: 700;
      opacity: 0; transform: translateY(6px);
      transition: opacity 200ms ease, transform 200ms ease;
      min-height: 26px; letter-spacing: .2px;
    }
    .ai-badge.show  { opacity: 1; transform: translateY(0); }
    .ai-badge.listen  { background: var(--blue-s);  color: var(--blue);   border: 1px solid #a8c7fa; }
    .ai-badge.think   { background: var(--yel-s);   color: #8a5e00;       border: 1px solid #f5d77e; }
    .ai-badge.tool    { background: var(--pur-s);   color: var(--purple);  border: 1px solid #c8b7f8; }
    .ai-badge.speak   { background: var(--grn-s);   color: #1a5e30;        border: 1px solid #93d5a8; }

    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%; background: currentColor;
      animation: bdot 1s ease-in-out infinite;
    }
    @keyframes bdot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }

    /* Controls row */
    .controls-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

    /* ── Response feed ──────────────────────────────────────────────── */
    .response-section {
      border-top: 1px solid var(--outline-soft);
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-height: 320px;
    }

    .response-header {
      padding: 10px 20px 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .response-label {
      font-size: 11px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase;
      color: var(--text-3);
    }
    .clear-btn {
      font-size: 11px; font-weight: 600; color: var(--blue); background: none;
      border: 0; cursor: pointer; padding: 2px 4px;
    }
    .clear-btn:hover { text-decoration: underline; }

    .feed {
      flex: 1; overflow-y: auto; padding: 0 20px 16px;
      display: flex; flex-direction: column; gap: 8px;
      scrollbar-width: thin; scrollbar-color: #d0d5dd transparent;
    }

    /* Empty state */
    .feed-empty {
      display: flex; align-items: center; gap: 8px;
      color: var(--text-3); font-size: 12px; padding: 10px 0;
    }
    .feed-empty svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: .6; }

    /* Response cards */
    .r-card {
      border: 1px solid var(--outline-soft); border-radius: var(--r-md);
      background: var(--surface-dim); overflow: hidden;
      animation: slide-in 220ms ease;
    }
    @keyframes slide-in { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }

    .r-card-header {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px 0;
    }
    .r-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
      padding: 2px 8px; border-radius: var(--r-pill);
    }
    .r-tag.info   { background: var(--blue-s); color: var(--blue); }
    .r-tag.task   { background: var(--grn-s);  color: #1a5e30; }
    .r-tag.event  { background: var(--blue-s); color: var(--blue); }
    .r-tag.email  { background: var(--yel-s);  color: #8a5e00; }
    .r-tag.tool   { background: var(--pur-s);  color: var(--purple); }
    .r-time { font-size: 10px; color: var(--text-3); margin-left: auto; }

    .r-body { padding: 8px 14px 12px; font-size: 13px; color: var(--text-2); line-height: 1.55; }

    /* List items inside a card */
    .r-list { list-style: none; display: flex; flex-direction: column; gap: 5px; padding: 6px 14px 12px; }
    .r-list-item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 13px; color: var(--text-2); line-height: 1.45;
    }
    .r-bullet {
      width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0; margin-top: 1px;
      display: grid; place-items: center; font-size: 10px; font-weight: 700;
    }
    .r-bullet.num  { background: var(--blue-s);  color: var(--blue); }
    .r-bullet.dot  { background: var(--grn-s);   color: #1a5e30; }
    .r-bullet.dash { background: var(--outline); color: var(--text-3); }

    .r-item-text { flex: 1; }
    .r-item-meta { font-size: 11px; color: var(--text-3); margin-top: 1px; }

    /* Tool call card */
    .tool-card {
      border: 1px solid var(--tool-border); border-radius: var(--r-md);
      background: var(--tool-bg); padding: 10px 14px;
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--purple); font-weight: 600;
      animation: slide-in 220ms ease;
    }
    .tool-card svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .tool-names { color: var(--text-2); font-weight: 400; }

    /* ── History drawer ─────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: var(--scrim); backdrop-filter: blur(2px);
      opacity: 0; pointer-events: none; transition: opacity 200ms ease; z-index: 40;
    }
    .overlay.open { opacity: 1; pointer-events: auto; }

    .drawer {
      position: fixed; top: 0; right: 0; width: min(400px,100vw); height: 100dvh;
      background: var(--surface-raised); border-left: 1px solid var(--outline);
      box-shadow: var(--e3); display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 220ms cubic-bezier(.4,0,.2,1); z-index: 50;
    }
    .drawer.open { transform: translateX(0); }

    .drawer-head {
      padding: 16px; border-bottom: 1px solid var(--outline-soft);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    }
    .drawer-head h2 { font-size: 16px; font-weight: 700; letter-spacing: -.1px; }
    .drawer-head p  { font-size: 12px; color: var(--text-3); margin-top: 3px; }

    .drawer-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }

    .log-item {
      border: 1px solid var(--outline-soft); border-radius: var(--r-sm);
      padding: 9px 11px; font-size: 12px; color: var(--text-2); line-height: 1.5;
      background: var(--surface-raised);
    }
    .log-item.err  { border-color: var(--err-border); background: var(--err-bg); color: var(--err-text); }
    .log-item.tool { border-color: var(--tool-border); background: var(--tool-bg); color: var(--purple); }
    .log-item.ai   { border-color: var(--ai-border); background: var(--ai-bg); color: var(--ai-text); }
    .log-meta { display: block; font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .3px; margin-bottom: 3px; }

    .visually-hidden { position: absolute; width: 1px; height: 1px; clip: rect(0,0,0,0); overflow: hidden; }

    @media (max-width: 640px) {
      .shell { padding: 10px 12px 12px; }
      .brand-sub, .vc-sub { display: none; }
      .voice-stage { padding: 16px 12px 10px; }
      .chips-row { padding: 8px 12px 0; }
      .r-card-header, .r-body, .r-list { padding-left: 12px; padding-right: 12px; }
      .feed { padding: 0 12px 12px; }
    }
  </style>
</head>
<body>

<main class="shell">

  <!-- ── Topbar ────────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon"></div>
      <div class="brand-text">
        <span class="brand-name">Workspace Assistant</span>
        <span class="brand-sub">Voice-first Google Workspace automation</span>
      </div>
    </div>
    <div class="topbar-right">
      <div id="profilePill" class="profile-pill">
        <img id="profileAvatar" alt="" />
        <span id="profileName" class="name">Loading…</span>
      </div>
      <!-- Theme toggle -->
      <button id="themeBtn" class="theme-btn" title="Toggle dark mode" aria-label="Toggle dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>

<script>
/* ===================================================================
   CONFIG
   =================================================================== */
const API_BASE     = window.location.origin;
const SESSION_KEY  = 'gw_agent_session_id';
const RECORDER_URL = '/static/audio-capture-worklet.js';
const PLAYER_URL   = '/static/pcm-player-processor.js';

const CHIPS = [
  "What's on my agenda today?",
  'Give me my daily briefing.',
  'Show my open tasks.',
  'Show unread emails.',
  'Create a task for me.',
  'Schedule a meeting.',
  'Draft an email.',
  'Move my next meeting.',
];


/* ===================================================================
   DOM REFS
   =================================================================== */
const profileAvatar  = document.getElementById('profileAvatar');
const profileName    = document.getElementById('profileName');
const logoutBtn      = document.getElementById('logoutBtn');
const connectBtn     = document.getElementById('connectBtn');
const disconnectBtn  = document.getElementById('disconnectBtn');
const micBtn         = document.getElementById('micBtn');
const micIcon        = document.getElementById('micIcon');
const micLabel       = document.getElementById('micLabel');
const orbWrap        = document.getElementById('orbWrap');
const statusText     = document.getElementById('statusText');
const aiBadge        = document.getElementById('aiBadge');
const aiBadgeText    = document.getElementById('aiBadgeText');
const connDot        = document.getElementById('connDot');
const historyBtn     = document.getElementById('historyBtn');
const themeBtn       = document.getElementById('themeBtn');
const closeDrawerBtn = document.getElementById('closeDrawerBtn');
const drawer         = document.getElementById('drawer');
const overlay        = document.getElementById('overlay');
const logList        = document.getElementById('logList');
const feed           = document.getElementById('feed');
const feedEmpty      = document.getElementById('feedEmpty');
const chipsRow       = document.getElementById('chipsRow');
const clearFeedBtn   = document.getElementById('clearFeedBtn');

/* ===================================================================
   THEME  (MD3 light / dark, respects prefers-color-scheme)
   =================================================================== */
const THEME_KEY = 'gw_agent_theme';

function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  themeBtn.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
  themeBtn.title = dark ? 'Switch to light mode' : 'Switch to dark mode';
}

function initTheme() {
  const stored = localStorage.getItem(THEME_KEY);
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(stored !== null ? stored === 'dark' : prefersDark);
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = !isDark;
  applyTheme(next);
  localStorage.setItem(THEME_KEY, next ? 'dark' : 'light');
}

// React to OS-level changes if user hasn't manually picked
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
  if (!localStorage.getItem(THEME_KEY)) applyTheme(e.matches);
});

initTheme();

/* ===================================================================
   STATE
   =================================================================== */
let sessionId = null;
let ws = null;
let playCtx = null, playerNode = null, playerLoaded = false;
let recCtx = null, micStream = null, micSrc = null, monGain = null, recProc = null;
let recLoaded = false;
let isMicOn = false;
let manualDisc = false, fatalErr = false;
let reconnTimer = null, reconnAttempts = 0;

/* ===================================================================
   CONNECTION DOT
   =================================================================== */
function setConnState(state) { // 'disconnected'|'connecting'|'connected'|'error'
  connDot.className = 'conn-dot ' + (state === 'connected' ? 'connected' : state === 'connecting' ? 'connecting' : state === 'error' ? 'error' : '');
  connDot.title = state.charAt(0).toUpperCase() + state.slice(1);
}

/* ===================================================================
   AI BADGE + ORB STATE
   state: 'idle'|'listening'|'thinking'|'tool'|'speaking'
   =================================================================== */
function setAiState(state, label) {
  orbWrap.classList.remove('listening', 'speaking', 'thinking', 'muted');
  aiBadge.classList.remove('show', 'listen', 'think', 'tool', 'speak');

  if (state === 'listening') { orbWrap.classList.add('listening'); }
  if (state === 'speaking')  { orbWrap.classList.add('speaking');  }
  if (state === 'thinking' || state === 'tool') { orbWrap.classList.add('thinking'); }
  if (state === 'idle' && isMicOn === false) { orbWrap.classList.add('muted'); }

  if (state !== 'idle') {
    aiBadgeText.textContent = label || state;
    const cls = { listening:'listen', thinking:'think', tool:'tool', speaking:'speak' }[state] || 'listen';
    aiBadge.classList.add('show', cls);
  }
}

/* ===================================================================
   LOGGING
   =================================================================== */
function addLog(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'log-item' + (type ? ' ' + type : '');
  const ts = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  el.innerHTML = `<span class="log-meta">${ts}</span>${msg}`;
  logList.prepend(el);
}

function setStatus(msg) { statusText.textContent = msg; }

/* ===================================================================
   RESPONSE FEED
   =================================================================== */
function hideFeedEmpty() {
  if (feedEmpty) feedEmpty.style.display = 'none';
}

function parseResponseText(text) {
  // Detect numbered list: lines starting with "1." "2)" etc.
  const numberedRe = /^(\d+)[.)]\s+(.+)/;
  // Detect bullet list: lines starting with -  •  *
  const bulletRe   = /^[-•*]\s+(.+)/;
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  const numbered = lines.filter(l => numberedRe.test(l));
  const bulleted  = lines.filter(l => bulletRe.test(l));

  if (numbered.length >= 2) {
    return {
      type: 'numbered',
      preamble: lines.filter(l => !numberedRe.test(l)).join(' ').trim(),
      items: numbered.map(l => { const m = l.match(numberedRe); return { n: m[1], text: m[2] }; }),
    };
  }
  if (bulleted.length >= 2) {
    return {
      type: 'bulleted',
      preamble: lines.filter(l => !bulletRe.test(l)).join(' ').trim(),
      items: bulleted.map(l => { const m = l.match(bulletRe); return m[1]; }),
    };
  }
  return { type: 'plain', text };
}

function guessTag(text) {
  const t = text.toLowerCase();
  if (/\b(task|to.?do|complete|due|deadline)\b/.test(t)) return 'task';
  if (/\b(meeting|event|calendar|schedule|appointment|pm|am|tomorrow|today)\b/.test(t)) return 'event';
  if (/\b(email|inbox|unread|subject|from:|sent)\b/.test(t)) return 'email';
  return 'info';
}

function buildResponseCard(text) {
  const parsed = parseResponseText(text);
  const tag = guessTag(text);
  const ts = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  const card = document.createElement('div');
  card.className = 'r-card';

  // Header
  const header = document.createElement('div');
  header.className = 'r-card-header';
  header.innerHTML = `<span class="r-tag ${tag}">${tag.charAt(0).toUpperCase()+tag.slice(1)}</span><span class="r-time">${ts}</span>`;
  card.appendChild(header);

  if (parsed.type === 'numbered' || parsed.type === 'bulleted') {
    if (parsed.preamble) {
      const pre = document.createElement('div');
      pre.className = 'r-body';
      pre.textContent = parsed.preamble;
      card.appendChild(pre);
    }
    const ul = document.createElement('ul');
    ul.className = 'r-list';
    parsed.items.forEach((item, i) => {
      const li = document.createElement('li');
      li.className = 'r-list-item';
      const bulletClass = parsed.type === 'numbered' ? 'num' : 'dot';
      const bulletLabel = parsed.type === 'numbered' ? (item.n || (i + 1)) : '✓';
      const itemText    = parsed.type === 'numbered' ? item.text : item;

      // Try to split meta info (e.g. "· Due Friday")
      const [main, ...meta] = itemText.split(/\s[·•|]\s/);
      li.innerHTML = `
        <span class="r-bullet ${bulletClass}">${bulletLabel}</span>
        <span class="r-item-text">
          <span>${main.trim()}</span>
          ${meta.length ? `<span class="r-item-meta">${meta.join(' · ')}</span>` : ''}
        </span>`;
      ul.appendChild(li);
    });
    card.appendChild(ul);
  } else {
    const body = document.createElement('div');
    body.className = 'r-body';
    body.textContent = text;
    card.appendChild(body);
  }

  return card;
}

function addToolCard(toolNames) {
  const el = document.createElement('div');
  el.className = 'tool-card';
  const ts = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  el.innerHTML = `
    <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
    Calling tool&nbsp;<span class="tool-names">${toolNames.join(', ')}</span>
    <span style="margin-left:auto;font-size:10px;color:var(--text-3);font-weight:400;">${ts}</span>`;
  hideFeedEmpty();
  feed.appendChild(el);
  feed.scrollTop = feed.scrollHeight;
}

function addResponseCard(text) {
  if (!text || !text.trim()) return;
  const card = buildResponseCard(text.trim());
  hideFeedEmpty();
  feed.appendChild(card);
  feed.scrollTop = feed.scrollHeight;
}

/* ===================================================================
   AUDIO PLAYBACK
   =================================================================== */
async function ensurePlayCtx() {
  const C = window.AudioContext || window.webkitAudioContext;
  if (!C) throw new Error('Web Audio not supported');
  if (!playCtx || playCtx.state === 'closed') playCtx = new C({ sampleRate: 24000 });
  if (playCtx.state === 'suspended') await playCtx.resume();
  return playCtx;
}

async function ensurePlayerNode() {
  if (playerNode) return playerNode;
  const ctx = await ensurePlayCtx();
  if (!ctx.audioWorklet) return null;
  if (!playerLoaded) { await ctx.audioWorklet.addModule(PLAYER_URL); playerLoaded = true; }
  playerNode = new AudioWorkletNode(ctx, 'pcm-player-processor');
  playerNode.connect(ctx.destination);
  return playerNode;
}

function clearPlayback() {
  if (playerNode?.port) playerNode.port.postMessage({ command: 'endOfAudio' });
}

async function playPcmBuffer(raw) {
  if (!raw || raw.byteLength === 0) return;
  const node = await ensurePlayerNode();
  if (node) { node.port.postMessage(raw, [raw]); return; }
  // Fallback
  const ctx = await ensurePlayCtx();
  const pcm = new Int16Array(raw);
  const f32 = new Float32Array(pcm.length);
  for (let i = 0; i < pcm.length; i++) f32[i] = pcm[i] / 0x8000;
  const buf = ctx.createBuffer(1, f32.length, 24000);
  buf.copyToChannel(f32, 0);
  const src = ctx.createBufferSource();
  src.buffer = buf; src.connect(ctx.destination); src.start();
}

/* ===================================================================
   AUDIO RECORDING
   =================================================================== */
async function ensureRecCtx() {
  const C = window.AudioContext || window.webkitAudioContext;
  if (!C) throw new Error('Web Audio not supported');
  if (!recCtx || recCtx.state === 'closed') recCtx = new C({ sampleRate: 16000 });
  if (recCtx.state === 'suspended') await recCtx.resume();
  return recCtx;
}

// Keep the recording context from auto-suspending (browser may suspend it
// when the tab is in background or when AI audio is playing).
let recContextKeepAlive = null;
function startRecCtxWatchdog() {
  if (recContextKeepAlive) return;
  recContextKeepAlive = setInterval(async () => {
    if (!isMicOn || !recCtx) return;
    if (recCtx.state === 'suspended') {
      try { await recCtx.resume(); }
      catch (_) {}
    }
  }, 800);
}
function stopRecCtxWatchdog() {
  if (recContextKeepAlive) { clearInterval(recContextKeepAlive); recContextKeepAlive = null; }
}

function float32ToPcm16(float32) {
  const out = new Int16Array(float32.length);
  for (let i = 0; i < float32.length; i++) {
    const s = Math.max(-1, Math.min(1, float32[i]));
    out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
  }
  return out;
}

function sendAudioChunk(float32) {
  if (!isMicOn || !ws || ws.readyState !== WebSocket.OPEN) return;
  const pcm = float32ToPcm16(float32);
  try { ws.send(pcm.buffer); }
  catch (_) {}
}

async function startMic() {
  if (isMicOn) return;
  const ctx = await ensureRecCtx();
  micStream = await navigator.mediaDevices.getUserMedia({
    audio: { channelCount: 1, sampleRate: 16000, echoCancellation: true, noiseSuppression: true, autoGainControl: true },
  });
  micSrc  = ctx.createMediaStreamSource(micStream);
  monGain = ctx.createGain(); monGain.gain.value = 0;

  let useWorklet = false;
  if (ctx.audioWorklet && window.AudioWorkletNode) {
    if (!recLoaded) {
      try { await ctx.audioWorklet.addModule(RECORDER_URL); recLoaded = true; useWorklet = true; }
      catch (_) { useWorklet = false; }
    } else { useWorklet = true; }
  }

  if (useWorklet) {
    recProc = new AudioWorkletNode(ctx, 'pcm-capture-processor');
    recProc.port.onmessage = e => sendAudioChunk(e.data);
  } else {
    recProc = ctx.createScriptProcessor(4096, 1, 1);
    recProc.onaudioprocess = e => sendAudioChunk(e.inputBuffer.getChannelData(0));
  }

  micSrc.connect(recProc);
  recProc.connect(monGain);
  monGain.connect(ctx.destination);

  isMicOn = true;
  startRecCtxWatchdog();

  // Signal mic active to backend
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'mic_start' }));
  }

  updateMicBtn();
  setStatus('Listening…');
  setAiState('listening', 'Listening…');
  addLog('Microphone on.');
}

function stopMic() {
  isMicOn = false;
  stopRecCtxWatchdog();

  if (recProc) { if (recProc.port) recProc.port.onmessage = null; recProc.disconnect(); recProc = null; }
  if (monGain)  { monGain.disconnect();  monGain  = null; }
  if (micSrc)   { micSrc.disconnect();   micSrc   = null; }
  if (micStream){ micStream.getTracks().forEach(t => t.stop()); micStream = null; }

  // Signal mic inactive to backend
  if (ws && ws.readyState === WebSocket.OPEN) {
    try { ws.send(JSON.stringify({ type: 'mic_stop' })); } catch (_) {}
  }

  updateMicBtn();
  setAiState('idle');
  if (ws && ws.readyState === WebSocket.OPEN) setStatus('Connected. Tap mic to speak.');
  addLog('Microphone muted.');
}

function updateMicBtn() {
  micBtn.setAttribute('aria-pressed', isMicOn ? 'true' : 'false');
  if (isMicOn) {
    micBtn.classList.remove('muted');
    micIcon.innerHTML = `<rect x="9" y="2" width="6" height="12" rx="3"/>
      <path d="M5 10a7 7 0 0 0 14 0"/>
      <line x1="12" y1="21" x2="12" y2="17"/>
      <line x1="9" y1="21" x2="15" y2="21"/>`;
    micLabel.textContent = 'Mute';
  } else {
    micBtn.classList.add('muted');
    micIcon.innerHTML = `<line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
      <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>`;
    micLabel.textContent = 'Unmute';
  }
}

/* ===================================================================
   RECONNECT
   =================================================================== */
function clearReconnTimer() { if (reconnTimer) { clearTimeout(reconnTimer); reconnTimer = null; } }
function scheduleReconn() {
  if (manualDisc || reconnTimer) return;
  reconnAttempts++;
  const delay = Math.min(1000 * (2 ** Math.min(reconnAttempts - 1, 4)), 16000);
  setStatus(`Reconnecting in ${Math.ceil(delay/1000)}s…`);
  reconnTimer = setTimeout(() => { reconnTimer = null; connectSocket(); }, delay);
}

function isModelErr(msg) {
  const n = String(msg||'').toLowerCase();
  return (n.includes('bidigeneratecontent') && n.includes('not found'))
    || (n.includes('live') && n.includes('not supported'))
    || (n.includes('model') && n.includes('not found for api version'));
}

/* ===================================================================
   WEBSOCKET
   =================================================================== */
function disconnectSocket(manual = true) {
  manualDisc = manual;
  clearReconnTimer();
  stopMic();
  clearPlayback();
  setAiState('idle');
  if (ws) { ws.close(); ws = null; }
  connectBtn.disabled = false; disconnectBtn.disabled = true; micBtn.disabled = true;
  setConnState('disconnected');
  setStatus('Disconnected.');
}

function connectSocket() {
  if (!sessionId) { addLog('No session — redirecting to sign in.', 'err'); window.location.replace('/ui'); return; }
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  manualDisc = false; fatalErr = false;
  clearReconnTimer();
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?session_id=${encodeURIComponent(sessionId)}`);
  ws.binaryType = 'arraybuffer';
  connectBtn.disabled = true; disconnectBtn.disabled = true; micBtn.disabled = true;
  setConnState('connecting'); setStatus('Connecting…');

  ws.onopen = () => {
    reconnAttempts = 0;
    connectBtn.disabled = true; disconnectBtn.disabled = false;
    setConnState('connecting');
    setStatus('Setting up AI session…');
    addLog('WebSocket connected.');
    // Safety fallback: if the server doesn't emit 'ready' within 5 s
    // (e.g. newer models that skip setup_complete), unlock the mic anyway.
    setTimeout(() => {
      if (micBtn.disabled && ws && ws.readyState === WebSocket.OPEN) {
        addLog('Ready event not received — enabling mic via fallback.');
        micBtn.disabled = false;
        setConnState('connected');
        setStatus('Ready — tap the mic to start.');
        setAiState('idle');
      }
    }, 5000);
  };

  ws.onmessage = async (evt) => {
    // Binary = PCM audio from AI
    if (evt.data instanceof ArrayBuffer) {
      if (orbWrap.className.indexOf('speaking') === -1) setAiState('speaking', 'AI is speaking…');
      await playPcmBuffer(evt.data);
      return;
    }
    if (evt.data instanceof Blob) {
      if (orbWrap.className.indexOf('speaking') === -1) setAiState('speaking', 'AI is speaking…');
      await playPcmBuffer(await evt.data.arrayBuffer());
      return;
    }

    // JSON = status / control
    let p;
    try { p = JSON.parse(evt.data); } catch (_) { return; }

    if (p.error) {
      addLog(`Server error: ${p.error}`, 'err');
      if (isModelErr(p.error)) {
        fatalErr = true;
        setStatus('Model unavailable. Check GEMINI_MODEL in your .env and restart.');
        setConnState('error');
        ws?.close(1011); return;
      }
      setAiState('idle');
      setStatus('Error — reconnecting…');
      return;
    }

    switch (p.type) {

      case 'ready':
        setConnState('connected');
        setStatus('Ready — tap the mic to start.');
        micBtn.disabled = false;
        addLog('AI session ready.');
        setAiState('idle');
        // Auto-start mic (user already granted permission during session)
        try { await startMic(); }
        catch (e) {
          addLog(`Mic permission denied or error: ${e.message}`, 'err');
          setStatus('Mic blocked. Tap the mic button to try again.');
        }
        break;

      case 'tool_calling': {
        const names = (p.tools||[]);
        setAiState('tool', `Calling ${names.join(', ')}`);
        setStatus(`Working on it… (${names.join(', ')})`);
        addToolCard(names);
        addLog(`Tool call: ${names.join(', ')}`, 'tool');
        break;
      }

      case 'tool_done':
        setAiState('thinking', 'Composing response…');
        setStatus('Composing response…');
        addLog(`Tool done: ${(p.tools||[]).join(', ')}`, 'tool');
        break;

      case 'interrupted':
        clearPlayback();
        // If mic is on, snap back to listening
        if (isMicOn) { setAiState('listening', 'Listening…'); setStatus('Listening…'); }
        else { setAiState('idle'); setStatus('Connected. Tap the mic to speak.'); }
        addLog('AI interrupted.');
        break;

      case 'turn_complete':
        // Critical for bidirectionality: after the model's turn, ensure the
        // mic & recording context are still live so Gemini keeps receiving audio.
        setAiState('idle');
        if (isMicOn) {
          // Resume recording context if browser suspended it during AI playback
          if (recCtx && recCtx.state === 'suspended') {
            try { await recCtx.resume(); } catch (_) {}
          }
          setAiState('listening', 'Listening…');
          setStatus('Listening…');
        } else {
          setStatus('Connected. Tap the mic to speak.');
        }
        addLog('AI turn complete.', 'ai');
        break;

      case 'text':
        if (p.text && p.text.trim()) {
          addResponseCard(p.text);
          addLog(`AI: ${p.text.trim().slice(0, 120)}${p.text.trim().length > 120 ? '…' : ''}`, 'ai');
        }
        break;

      default:
        // Backward-compat base64 audio chunk
        if (p.audio_chunk) {
          const raw = Uint8Array.from(atob(p.audio_chunk), c => c.charCodeAt(0)).buffer;
          if (orbWrap.className.indexOf('speaking') === -1) setAiState('speaking', 'AI is speaking…');
          await playPcmBuffer(raw);
        }
        break;
    }
  };

  ws.onerror = () => { addLog('WebSocket error.', 'err'); setConnState('error'); };

  ws.onclose = (evt) => {
    connectBtn.disabled = false; disconnectBtn.disabled = true; micBtn.disabled = true;
    stopMic(); clearPlayback(); setAiState('idle');
    setConnState('disconnected');
    const detail = evt.reason ? `${evt.code}: ${evt.reason}` : `code ${evt.code}`;
    setStatus(manualDisc ? 'Disconnected.' : 'Connection lost.');
    addLog(`WS closed (${detail}).`, manualDisc ? '' : 'err');
    ws = null;
    if (manualDisc) return;
    if (fatalErr) return;
    if (evt.code === 1008) {
      if ((evt.reason||'').toLowerCase().includes('invalid or expired session')) {
        localStorage.removeItem(SESSION_KEY); window.location.replace('/ui');
      } else { setStatus('Rejected by server. Check model config.'); }
      return;
    }
    scheduleReconn();
  };
}

/* ===================================================================
   DRAWER
   =================================================================== */
function openDrawer()  { drawer.classList.add('open'); overlay.classList.add('open'); drawer.setAttribute('aria-hidden','false'); }
function closeDrawer() { drawer.classList.remove('open'); overlay.classList.remove('open'); drawer.setAttribute('aria-hidden','true'); }

/* ===================================================================
   CHIPS
   =================================================================== */
function buildChips() {
  CHIPS.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 's-chip'; btn.type = 'button'; btn.setAttribute('role','listitem');
    btn.textContent = text;
    btn.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(text); addLog(`Prompt copied: "${text}"`); }
      catch (_) { addLog(`Try saying: "${text}"`); }
    });
    chipsRow.appendChild(btn);
  });
}

/* ===================================================================
   PROFILE
   =================================================================== */
async function fetchProfile() {
  const r = await fetch(`${API_BASE}/me?session_id=${encodeURIComponent(sessionId)}`);
  if (!r.ok) { localStorage.removeItem(SESSION_KEY); window.location.replace('/ui'); return null; }
  return r.json();
}

function captureSessionFromUrl() {
  const url = new URL(location.href);
  const s = url.searchParams.get('session_id');
  if (!s) return null;
  localStorage.setItem(SESSION_KEY, s);
  url.searchParams.delete('session_id');
  history.replaceState({}, '', url.toString());
  return s;
}

/* ===================================================================
   EVENT LISTENERS
   =================================================================== */
connectBtn.addEventListener('click', connectSocket);
disconnectBtn.addEventListener('click', () => disconnectSocket(true));
themeBtn.addEventListener('click', toggleTheme);
historyBtn.addEventListener('click', openDrawer);
closeDrawerBtn.addEventListener('click', closeDrawer);
overlay.addEventListener('click', closeDrawer);
clearFeedBtn.addEventListener('click', () => {
  feed.innerHTML = '';
  const empty = document.createElement('div');
  empty.className = 'feed-empty'; empty.id = 'feedEmpty';
  empty.innerHTML = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Responses will appear here during your conversation`;
  feed.appendChild(empty);
});
document.addEventListener('keydown', e => { if (e.key === 'Escape' && drawer.classList.contains('open')) closeDrawer(); });

micBtn.addEventListener('click', async () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) { connectSocket(); return; }
  if (isMicOn) { stopMic(); }
  else {
    try { await startMic(); }
    catch (e) { addLog(`Mic error: ${e.message}`, 'err'); }
  }
});

logoutBtn.addEventListener('click', async () => {
  if (!sessionId) return;
  try { await fetch(`${API_BASE}/logout?session_id=${encodeURIComponent(sessionId)}`, { method: 'POST' }); } catch (_) {}
  localStorage.removeItem(SESSION_KEY); disconnectSocket(true); window.location.replace('/ui');
});

/* ===================================================================
   BOOT
   =================================================================== */
(async () => {
  buildChips();
  sessionId = captureSessionFromUrl() || localStorage.getItem(SESSION_KEY);
  if (!sessionId) { window.location.replace('/ui'); return; }
  const profile = await fetchProfile();
  if (!profile) return;
  profileAvatar.src = profile.picture || '';
  profileName.textContent = profile.full_name || profile.email || 'Signed in';
  addLog('Session ready. Connecting…');
  connectSocket();
})();
</script>
